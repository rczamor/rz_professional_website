<!-- CHATBOT WIDGET - Self-contained, copy-paste ready -->

<style>
  /* ===== CHATBOT WIDGET STYLES ===== */
  .chatbot-widget {
    --chatbot-accent: var(--accent, #7B7FE4);
    --chatbot-accent-dim: var(--accent-dim, rgba(123,127,228,0.15));
    --chatbot-accent-glow: var(--accent-glow, rgba(123,127,228,0.08));
    --chatbot-bg-dark: #0a0a0f;
    --chatbot-bg-card: #0f0f16;
    --chatbot-text-primary: #f0f0f5;
    --chatbot-text-secondary: rgba(240,240,245,0.6);
    --chatbot-text-tertiary: rgba(240,240,245,0.35);
    --chatbot-border: rgba(255,255,255,0.08);
    --chatbot-font-heading: 'Bricolage Grotesque', -apple-system, BlinkMacSystemFont, sans-serif;
    --chatbot-font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --chatbot-font-mono: 'JetBrains Mono', monospace;
  }

  .chatbot-widget * {
    box-sizing: border-box;
  }

  /* Floating Button */
  .chatbot-button {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--chatbot-accent);
    color: white;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    box-shadow: 0 0 20px var(--chatbot-accent-glow), 0 4px 12px rgba(0,0,0,0.3);
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    font-size: 24px;
    animation: chatbot-pulse 3s ease-in-out infinite;
  }

  .chatbot-button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 30px var(--chatbot-accent-glow), 0 6px 20px rgba(0,0,0,0.4);
  }

  .chatbot-button:active {
    transform: scale(0.95);
  }

  @keyframes chatbot-pulse {
    0%, 100% {
      box-shadow: 0 0 20px var(--chatbot-accent-glow), 0 4px 12px rgba(0,0,0,0.3);
    }
    50% {
      box-shadow: 0 0 35px var(--chatbot-accent-glow), 0 4px 12px rgba(0,0,0,0.3);
    }
  }

  /* Chat Panel */
  .chatbot-panel {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 400px;
    height: 600px;
    max-height: 80vh;
    background: var(--chatbot-bg-dark);
    border: 1px solid var(--chatbot-border);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    z-index: 999;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    opacity: 0;
    transform: translateY(20px) scale(0.95);
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .chatbot-panel.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  /* Panel Header */
  .chatbot-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--chatbot-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, rgba(123,127,228,0.08) 0%, transparent 100%);
    border-radius: 20px 20px 0 0;
    position: relative;
    z-index: 10;
  }

  .chatbot-title {
    font-family: var(--chatbot-font-heading);
    font-size: 16px;
    font-weight: 600;
    color: var(--chatbot-text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chatbot-beta-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 6px;
    background: var(--chatbot-accent-dim);
    color: var(--chatbot-accent);
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .chatbot-close {
    background: none;
    border: none;
    color: var(--chatbot-text-secondary);
    cursor: pointer;
    font-size: 20px;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .chatbot-close:hover {
    color: var(--chatbot-text-primary);
  }

  /* Messages Container */
  .chatbot-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .chatbot-messages::-webkit-scrollbar {
    width: 6px;
  }

  .chatbot-messages::-webkit-scrollbar-track {
    background: transparent;
  }

  .chatbot-messages::-webkit-scrollbar-thumb {
    background: var(--chatbot-border);
    border-radius: 3px;
  }

  .chatbot-messages::-webkit-scrollbar-thumb:hover {
    background: rgba(255,255,255,0.15);
  }

  /* Message Bubble */
  .chatbot-message {
    display: flex;
    gap: 8px;
    animation: chatbot-fade-in 0.3s ease-out;
  }

  @keyframes chatbot-fade-in {
    from {
      opacity: 0;
      transform: translateY(8px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .chatbot-message.user {
    justify-content: flex-end;
  }

  .chatbot-message.bot {
    justify-content: flex-start;
  }

  .chatbot-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--chatbot-accent-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--chatbot-accent);
    font-size: 16px;
    flex-shrink: 0;
  }

  .chatbot-bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 16px;
    font-family: var(--chatbot-font-sans);
    font-size: 14px;
    line-height: 1.4;
    word-wrap: break-word;
  }

  .chatbot-message.user .chatbot-bubble {
    background: var(--chatbot-accent);
    color: white;
    border-radius: 16px 16px 4px 16px;
  }

  .chatbot-message.bot .chatbot-bubble {
    background: var(--chatbot-bg-card);
    color: var(--chatbot-text-primary);
    border-radius: 16px 16px 16px 4px;
  }

  /* Typing Indicator */
  .chatbot-typing {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: var(--chatbot-bg-card);
    border-radius: 16px 16px 16px 4px;
    width: fit-content;
  }

  .chatbot-typing-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--chatbot-text-secondary);
    animation: chatbot-typing 1.4s infinite;
  }

  .chatbot-typing-dot:nth-child(2) {
    animation-delay: 0.2s;
  }

  .chatbot-typing-dot:nth-child(3) {
    animation-delay: 0.4s;
  }

  @keyframes chatbot-typing {
    0%, 60%, 100% {
      opacity: 0.3;
      transform: translateY(0);
    }
    30% {
      opacity: 1;
      transform: translateY(-8px);
    }
  }

  /* Source Citations */
  .chatbot-sources {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 12px;
  }

  .chatbot-source-button {
    background: none;
    border: none;
    color: var(--chatbot-text-tertiary);
    cursor: pointer;
    font-family: var(--chatbot-font-mono);
    padding: 0;
    text-align: left;
    transition: color 0.2s;
    width: 100%;
    text-decoration: underline;
    text-decoration-color: rgba(255,255,255,0.1);
  }

  .chatbot-source-button:hover {
    color: var(--chatbot-text-secondary);
    text-decoration-color: rgba(255,255,255,0.3);
  }

  .chatbot-source-expanded {
    margin-top: 4px;
    padding: 8px;
    background: rgba(123,127,228,0.06);
    border-left: 2px solid var(--chatbot-accent);
    border-radius: 4px;
    font-family: var(--chatbot-font-mono);
    font-size: 11px;
    color: var(--chatbot-text-secondary);
  }

  /* Welcome State */
  .chatbot-welcome {
    text-align: center;
    color: var(--chatbot-text-secondary);
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .chatbot-suggestions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .chatbot-suggestion {
    background: var(--chatbot-bg-card);
    border: 1px solid var(--chatbot-border);
    color: var(--chatbot-text-primary);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--chatbot-font-sans);
    text-align: left;
  }

  .chatbot-suggestion:hover {
    background: var(--chatbot-accent-dim);
    border-color: var(--chatbot-accent);
    color: var(--chatbot-accent);
  }

  .chatbot-suggestion:active {
    transform: scale(0.98);
  }

  /* Input Area */
  .chatbot-input-area {
    padding: 12px;
    border-top: 1px solid var(--chatbot-border);
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .chatbot-input-field {
    flex: 1;
    background: var(--chatbot-bg-card);
    border: none;
    color: var(--chatbot-text-primary);
    padding: 12px 14px;
    border-radius: 8px;
    font-family: var(--chatbot-font-sans);
    font-size: 14px;
    resize: none;
    max-height: 100px;
    font-size: 14px;
    line-height: 1.4;
  }

  .chatbot-input-field::placeholder {
    color: var(--chatbot-text-tertiary);
  }

  .chatbot-input-field:focus {
    outline: none;
    background: var(--chatbot-bg-card);
    box-shadow: inset 0 0 0 1px var(--chatbot-accent);
  }

  .chatbot-send-btn {
    background: var(--chatbot-accent);
    border: none;
    color: white;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .chatbot-send-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 12px rgba(123,127,228,0.3);
  }

  .chatbot-send-btn:active {
    transform: scale(0.95);
  }

  .chatbot-send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Notify CTA */
  .chatbot-notify-section {
    margin-top: 12px;
    padding: 12px;
    background: var(--chatbot-accent-dim);
    border-radius: 8px;
    display: flex;
    gap: 8px;
  }

  .chatbot-notify-input {
    flex: 1;
    background: var(--chatbot-bg-card);
    border: none;
    color: var(--chatbot-text-primary);
    padding: 8px 10px;
    border-radius: 4px;
    font-family: var(--chatbot-font-sans);
    font-size: 12px;
  }

  .chatbot-notify-input::placeholder {
    color: var(--chatbot-text-tertiary);
  }

  .chatbot-notify-input:focus {
    outline: none;
    background: var(--chatbot-bg-card);
    box-shadow: inset 0 0 0 1px var(--chatbot-accent);
  }

  .chatbot-notify-btn {
    background: var(--chatbot-accent);
    border: none;
    color: white;
    padding: 8px 10px;
    border-radius: 4px;
    font-family: var(--chatbot-font-sans);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .chatbot-notify-btn:hover {
    transform: scale(1.05);
  }

  .chatbot-notify-btn:active {
    transform: scale(0.95);
  }

  /* Responsive */
  @media (max-width: 640px) {
    .chatbot-panel {
      width: calc(100vw - 32px);
      height: calc(100vh - 100px);
      bottom: 16px;
      right: 16px;
    }

    .chatbot-bubble {
      max-width: 85%;
    }
  }
</style>

<div class="chatbot-widget">
  <!-- Floating Button -->
  <button class="chatbot-button" aria-label="Open chat" title="Chat with Riché">
    <span class="material-symbols-outlined">smart_toy</span>
  </button>

  <!-- Chat Panel -->
  <div class="chatbot-panel">
    <!-- Header -->
    <div class="chatbot-header">
      <div class="chatbot-title">
        Context Layer Engine
        <span class="chatbot-beta-badge">beta</span>
      </div>
      <button class="chatbot-close" aria-label="Close chat">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <!-- Messages -->
    <div class="chatbot-messages"></div>

    <!-- Input -->
    <div class="chatbot-input-area">
      <input
        type="text"
        class="chatbot-input-field"
        placeholder="Ask me anything..."
        aria-label="Message input"
      />
      <button class="chatbot-send-btn" aria-label="Send message">
        <span class="material-symbols-outlined">send</span>
      </button>
    </div>
  </div>
</div>

<script>
  /* ===== CHATBOT WIDGET ENGINE ===== */
  (function() {
    const widget = document.querySelector('.chatbot-widget');
    const button = document.querySelector('.chatbot-button');
    const panel = document.querySelector('.chatbot-panel');
    const messagesContainer = document.querySelector('.chatbot-messages');
    const inputField = document.querySelector('.chatbot-input-field');
    const sendBtn = document.querySelector('.chatbot-send-btn');
    const closeBtn = document.querySelector('.chatbot-close');

    // State
    let messages = [];
    let isFirstMessage = true;

    // Toggle panel
    function togglePanel() {
      panel.classList.toggle('open');
      if (panel.classList.contains('open')) {
        inputField.focus();
      }
    }

    // Add event listeners
    button.addEventListener('click', togglePanel);
    closeBtn.addEventListener('click', () => panel.classList.remove('open'));

    // Close on escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && panel.classList.contains('open')) {
        panel.classList.remove('open');
      }
    });

    // Close on outside click
    document.addEventListener('click', (e) => {
      if (!widget.contains(e.target) && panel.classList.contains('open')) {
        panel.classList.remove('open');
      }
    });

    // Render welcome message on first open
    function renderWelcome() {
      if (isFirstMessage) {
        const welcomeMsg = document.createElement('div');
        welcomeMsg.className = 'chatbot-message bot';
        welcomeMsg.innerHTML = `
          <div class="chatbot-avatar">
            <span class="material-symbols-outlined">psychology</span>
          </div>
          <div style="flex: 1;">
            <div class="chatbot-bubble">
              Hi! I'm Riché's Context Layer Engine — an AI grounded in his knowledge base, writing, and frameworks. Ask me about context architecture, AI product strategy, or Riché's work.
            </div>
            <div class="chatbot-suggestions">
              <button class="chatbot-suggestion">What is context architecture?</button>
              <button class="chatbot-suggestion">Tell me about the thesis</button>
              <button class="chatbot-suggestion">What's Riché's background?</button>
            </div>
          </div>
        `;
        messagesContainer.appendChild(welcomeMsg);

        // Suggestion handlers
        welcomeMsg.querySelectorAll('.chatbot-suggestion').forEach((btn) => {
          btn.addEventListener('click', () => {
            sendMessage(btn.textContent.trim());
          });
        });

        isFirstMessage = false;
        scrollToBottom();
      }
    }

    // Send message
    function sendMessage(text) {
      if (!text.trim()) return;

      // Render welcome if first message
      if (isFirstMessage) {
        renderWelcome();
      }

      // Add user message
      const userMsg = document.createElement('div');
      userMsg.className = 'chatbot-message user';
      userMsg.innerHTML = `
        <div class="chatbot-bubble">${escapeHtml(text)}</div>
      `;
      messagesContainer.appendChild(userMsg);
      messages.push({ role: 'user', content: text });

      // Clear input
      inputField.value = '';
      inputField.style.height = 'auto';
      scrollToBottom();

      // Disable send while processing
      sendBtn.disabled = true;
      inputField.disabled = true;

      // Show typing indicator
      const typingMsg = document.createElement('div');
      typingMsg.className = 'chatbot-message bot';
      typingMsg.innerHTML = `
        <div class="chatbot-avatar">
          <span class="material-symbols-outlined">psychology</span>
        </div>
        <div class="chatbot-typing">
          <div class="chatbot-typing-dot"></div>
          <div class="chatbot-typing-dot"></div>
          <div class="chatbot-typing-dot"></div>
        </div>
      `;
      messagesContainer.appendChild(typingMsg);
      scrollToBottom();

      // Simulate response delay (1.5s)
      setTimeout(() => {
        typingMsg.remove();

        // Add bot response
        const botMsg = document.createElement('div');
        botMsg.className = 'chatbot-message bot';
        botMsg.innerHTML = `
          <div class="chatbot-avatar">
            <span class="material-symbols-outlined">psychology</span>
          </div>
          <div style="flex: 1;">
            <div class="chatbot-bubble">
              The Context Layer Engine is currently in development. In the meantime, you can explore Riché's <a href="/thesis" style="color: var(--chatbot-accent); text-decoration: underline;">thesis</a>, <a href="/work" style="color: var(--chatbot-accent); text-decoration: underline;">work history</a>, or <a href="/contact" style="color: var(--chatbot-accent); text-decoration: underline;">get in touch</a> directly.
            </div>
            <div class="chatbot-notify-section">
              <input
                type="email"
                class="chatbot-notify-input"
                placeholder="your@email.com"
                aria-label="Email for notification"
              />
              <button class="chatbot-notify-btn">Notify me</button>
            </div>
          </div>
        `;
        messagesContainer.appendChild(botMsg);

        // Notify button handler
        const notifyBtn = botMsg.querySelector('.chatbot-notify-btn');
        const notifyInput = botMsg.querySelector('.chatbot-notify-input');

        notifyBtn.addEventListener('click', () => {
          const email = notifyInput.value.trim();
          if (email && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            notifyBtn.textContent = 'Thanks!';
            notifyBtn.disabled = true;
            notifyInput.disabled = true;
            notifyInput.value = '';
            setTimeout(() => {
              botMsg.remove();
            }, 2000);
          } else {
            notifyInput.style.boxShadow = 'inset 0 0 0 1px #ff6b6b';
          }
        });

        notifyInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            notifyBtn.click();
          }
        });

        messages.push({ role: 'bot', content: 'pre-launch' });

        // Re-enable input
        sendBtn.disabled = false;
        inputField.disabled = false;
        inputField.focus();
        scrollToBottom();
      }, 1500);
    }

    // Input handlers
    inputField.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage(inputField.value);
      }
    });

    inputField.addEventListener('input', () => {
      inputField.style.height = 'auto';
      inputField.style.height = Math.min(inputField.scrollHeight, 100) + 'px';
    });

    sendBtn.addEventListener('click', () => {
      sendMessage(inputField.value);
    });

    // Auto-scroll to bottom
    function scrollToBottom() {
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Escape HTML
    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;',
      };
      return text.replace(/[&<>"']/g, (m) => map[m]);
    }

    // Render initial welcome on first interaction
    button.addEventListener('click', () => {
      if (panel.classList.contains('open') && isFirstMessage) {
        renderWelcome();
      }
    });
  })();
</script>
